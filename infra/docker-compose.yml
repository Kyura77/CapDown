services:
  postgres:
    image: postgres:17-alpine
    container_name: capdown-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: capdown
      POSTGRES_USER: capdown
      POSTGRES_PASSWORD: capdown
    ports:
      - "5432:5432"
    volumes:
      - capdown-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capdown -d capdown"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: capdown-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - capdown-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  capdown-postgres-data:
  capdown-redis-data:
